<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mengalihkan Halaman...</title>
    
    <meta http-equiv="refresh" content="0; url=https://raihandigital.vercel.app">
    
    <script>
        window.location.href = "https://raihandigital.vercel.app";
    </script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h2>Sedang mengalihkan ke Raihan Digital...</h2>
    <p>Jika Anda tidak dialihkan secara otomatis, silakan klik tautan di bawah ini:</p>
    <a href="https://raihandigital.vercel.app">Buka Raihan Digital Sekarang</a>

</body>
</html>
